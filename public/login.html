<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HomeOS — Přihlášení</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d0f12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <style>
    :root {
      --bg:      #0d0f12;
      --surface: #141720;
      --surface2:#1c2030;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);
      --text:    #e8eaf0;
      --sub:     rgba(232,234,240,0.45);
      --accent:  #4f8ef7;
      --accent2: #7c6af7;
      --red:     #f25f5c;
      --green:   #3ecf8e;
      --r:       14px;
      --font:    'DM Sans', sans-serif;
      --mono:    'DM Mono', monospace;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font);
      font-size:14px;
      -webkit-font-smoothing:antialiased;
      overflow:hidden;
    }

    /* Animované pozadí */
    .bg-orbs {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      overflow:hidden;
    }
    .orb {
      position:absolute; border-radius:50%;
      filter:blur(80px); opacity:0.35;
      animation:orbFloat 12s ease-in-out infinite;
    }
    .orb-1 {
      width:400px; height:400px;
      background:radial-gradient(circle, #4f8ef7, transparent);
      top:-100px; left:-80px;
      animation-delay:0s;
    }
    .orb-2 {
      width:350px; height:350px;
      background:radial-gradient(circle, #7c6af7, transparent);
      bottom:-80px; right:-60px;
      animation-delay:-4s;
    }
    .orb-3 {
      width:200px; height:200px;
      background:radial-gradient(circle, #3ecf8e, transparent);
      top:50%; left:60%;
      animation-delay:-8s;
      opacity:0.2;
    }
    @keyframes orbFloat {
      0%, 100% { transform:translate(0,0) scale(1); }
      33%       { transform:translate(30px,-20px) scale(1.05); }
      66%       { transform:translate(-20px,15px) scale(0.95); }
    }

    /* Noise overlay */
    .noise {
      position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:150px;
    }

    /* Wrapper */
    .login-wrap {
      position:relative; z-index:2;
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px;
      padding-top:env(safe-area-inset-top, 24px);
      padding-bottom:env(safe-area-inset-bottom, 24px);
    }

    /* Logo */
    .login-logo {
      display:flex; align-items:center; gap:12px;
      margin-bottom:48px;
      animation:fadeUp 0.5s ease both;
    }
    .logo-icon {
      width:48px; height:48px; border-radius:14px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-size:22px;
      box-shadow:0 8px 32px rgba(79,142,247,0.3);
    }
    .logo-text {
      font-size:28px; font-weight:600; letter-spacing:-0.03em;
    }
    .logo-sub {
      font-size:13px; color:var(--sub); margin-top:2px;
    }

    /* Karta */
    .login-card {
      width:100%; max-width:380px;
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:24px;
      padding:32px;
      box-shadow:0 24px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation:fadeUp 0.5s 0.1s ease both;
    }

    .card-title {
      font-size:20px; font-weight:600; margin-bottom:4px;
    }
    .card-sub {
      font-size:13px; color:var(--sub); margin-bottom:28px;
    }

    /* Form */
    .field {
      margin-bottom:16px;
    }
    .field label {
      display:block; font-size:11px; font-weight:600;
      text-transform:uppercase; letter-spacing:0.08em;
      color:var(--sub); margin-bottom:8px;
    }
    .field-wrap {
      position:relative;
    }
    .field-wrap svg {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      width:16px; height:16px; stroke:var(--sub); fill:none;
      stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;
      pointer-events:none; transition:stroke 0.2s;
    }
    .field input {
      width:100%; background:var(--surface2);
      border:1px solid var(--border);
      border-radius:10px; color:var(--text);
      font-family:var(--font); font-size:14px;
      padding:12px 14px 12px 42px;
      outline:none; transition:all 0.2s;
      -webkit-appearance:none;
    }
    .field input::placeholder { color:var(--sub); }
    .field input:focus {
      border-color:var(--accent);
      background:rgba(79,142,247,0.04);
      box-shadow:0 0 0 3px rgba(79,142,247,0.12);
    }
    .field input:focus + svg,
    .field-wrap:focus-within svg { stroke:var(--accent); }

    /* Přepnout viditelnost hesla */
    .toggle-pass {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer;
      color:var(--sub); padding:4px; line-height:0;
      transition:color 0.2s;
    }
    .toggle-pass:hover { color:var(--text); }
    .toggle-pass svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; }

    /* Chybová hláška */
    .error-msg {
      display:none; align-items:center; gap:8px;
      background:rgba(242,95,92,0.1); border:1px solid rgba(242,95,92,0.25);
      border-radius:10px; padding:10px 14px;
      color:var(--red); font-size:13px;
      margin-bottom:20px;
      animation:shake 0.4s ease;
    }
    .error-msg.show { display:flex; }
    .error-msg svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }

    /* Submit tlačítko */
    .btn-login {
      width:100%; padding:14px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      border:none; border-radius:10px;
      color:white; font-family:var(--font); font-size:15px; font-weight:600;
      cursor:pointer; letter-spacing:0.01em;
      box-shadow:0 8px 24px rgba(79,142,247,0.25);
      transition:all 0.2s;
      position:relative; overflow:hidden;
    }
    .btn-login:hover { transform:translateY(-1px); box-shadow:0 12px 32px rgba(79,142,247,0.35); }
    .btn-login:active { transform:translateY(0); }
    .btn-login.loading { pointer-events:none; opacity:0.7; }
    .btn-login .btn-spinner {
      display:none; width:18px; height:18px; border-radius:50%;
      border:2px solid rgba(255,255,255,0.3); border-top-color:white;
      animation:spin 0.7s linear infinite; margin:0 auto;
    }
    .btn-login.loading .btn-text { display:none; }
    .btn-login.loading .btn-spinner { display:block; }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Verze */
    .login-footer {
      margin-top:24px; text-align:center;
      font-size:12px; color:var(--sub);
      animation:fadeUp 0.5s 0.2s ease both;
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="noise"></div>

  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-icon">⌂</div>
      <div>
        <div class="logo-text">HomeOS</div>
        <div class="logo-sub">Chytrá domácnost</div>
      </div>
    </div>

    <div class="login-card">
      <div class="card-title">Přihlásit se</div>
      <div class="card-sub">Zadej své přihlašovací údaje</div>

      <div class="error-msg" id="error-msg">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text">Špatné přihlašovací údaje</span>
      </div>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="field">
          <label>Uživatelské jméno</label>
          <div class="field-wrap">
            <input type="text" id="username" name="username" placeholder="Zadej username"
              autocomplete="username" autocapitalize="none" required>
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>

        <div class="field">
          <label>Heslo</label>
          <div class="field-wrap">
            <input type="password" id="password" name="password" placeholder="Zadej heslo"
              autocomplete="current-password" required>
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button type="button" class="toggle-pass" id="toggle-pass" onclick="togglePass()" title="Zobrazit heslo">
              <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div style="height:8px"></div>

        <button type="submit" class="btn-login" id="btn-login">
          <span class="btn-text">Přihlásit se</span>
          <div class="btn-spinner"></div>
        </button>
      </form>
    </div>

    <div class="login-footer">HomeOS &nbsp;·&nbsp; Chytrá domácnost</div>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      const errTxt = document.getElementById('error-text');

      btn.classList.add('loading');
      errEl.classList.remove('show');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/';
        } else {
          errTxt.textContent = data.error || 'Špatné přihlašovací údaje';
          errEl.classList.add('show');
          btn.classList.remove('loading');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch(err) {
        errTxt.textContent = 'Chyba připojení k serveru';
        errEl.classList.add('show');
        btn.classList.remove('loading');
      }
    }

    function togglePass() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    // Fokus na username při načtení
    window.addEventListener('load', () => {
      document.getElementById('username').focus();
    });
  </script>
</body>
</html>
