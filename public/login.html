<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HomeOS — Přihlášení</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#080b12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <style>
    :root {
      --bg: #080b12; --s1: #0e1220; --s2: #141929; --s3: #1c2238;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #e2e8f8; --text2: #8892b0;
      --accent: #4f8ef7; --accent2: #818cf8;
      --red: #f87171; --green: #34d399;
      --font: 'Inter', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; -webkit-font-smoothing: antialiased; }
    body { display: flex; align-items: center; justify-content: center; padding: 24px; padding-top: max(env(safe-area-inset-top, 24px), 24px); padding-bottom: max(env(safe-area-inset-bottom, 24px), 24px); min-height: 100%; }

    /* Animované pozadí */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 50% 40% at 15% 20%, rgba(79,142,247,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 85% 80%, rgba(129,140,248,0.10) 0%, transparent 60%);
    }
    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(79,142,247,0.3);
    }
    .logo-icon svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; }
    .logo-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

    /* Error */
    .error {
      display: none; align-items: center; gap: 8px;
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px; padding: 10px 14px;
      color: var(--red); font-size: 13px; margin-bottom: 18px;
      animation: shake 0.35s ease;
    }
    .error.show { display: flex; }
    .error svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }

    /* Fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); margin-bottom: 7px; }
    .field-inner { position: relative; }
    .field-inner svg.fi { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--text2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; transition: stroke 0.15s; }
    .field-inner input {
      width: 100%; padding: 12px 42px;
      background: var(--s2); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text);
      font-family: var(--font); font-size: 14px;
      outline: none; transition: all 0.15s; -webkit-appearance: none;
    }
    .field-inner input::placeholder { color: var(--text2); opacity: 0.6; }
    .field-inner input:focus { border-color: var(--accent); background: rgba(79,142,247,0.04); box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
    .field-inner:focus-within svg.fi { stroke: var(--accent); }
    .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text2); padding: 4px; transition: color 0.15s; }
    .eye-btn:hover { color: var(--text); }
    .eye-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

    /* Remember */
    .remember { display: flex; align-items: center; gap: 10px; margin: 18px 0 22px; }
    .cb { position: relative; width: 20px; height: 20px; flex-shrink: 0; }
    .cb input { position: absolute; inset: 0; opacity: 0; cursor: pointer; margin: 0; }
    .cb-box { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border2); background: var(--s2); display: flex; align-items: center; justify-content: center; transition: all 0.15s; pointer-events: none; }
    .cb input:checked ~ .cb-box { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.18); }
    .cb-box svg { width: 11px; height: 11px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; opacity: 0; transform: scale(0.5); transition: all 0.12s; }
    .cb input:checked ~ .cb-box svg { opacity: 1; transform: scale(1); }
    .remember-text { font-size: 13px; color: var(--text2); cursor: pointer; user-select: none; }
    .remember-text strong { color: var(--text); font-weight: 500; }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: white; font-family: var(--font); font-size: 15px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.01em;
      box-shadow: 0 6px 20px rgba(79,142,247,0.3);
      transition: all 0.2s; position: relative;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(79,142,247,0.4); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-spinner { display: none; width: 18px; height: 18px; margin: 0 auto; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; animation: spin 0.7s linear infinite; }
    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .btn-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .card-footer { margin-top: 20px; text-align: center; font-size: 11px; color: var(--text2); }

    @media (max-width: 420px) {
      .card { padding: 28px 20px; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="grid-bg"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      </div>
      <div>
        <div class="logo-text">HomeOS</div>
        <div class="logo-sub">Chytrá domácnost</div>
      </div>
    </div>

    <h1>Přihlásit se</h1>
    <p class="subtitle">Zadej přihlašovací údaje pro přístup</p>

    <div class="error" id="err">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="err-text">Špatné přihlašovací údaje</span>
    </div>

    <form onsubmit="doLogin(event)" novalidate>
      <div class="field">
        <label for="u">Uživatelské jméno</label>
        <div class="field-inner">
          <svg class="fi" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="u" placeholder="username" autocomplete="username" autocapitalize="none" required>
        </div>
      </div>

      <div class="field">
        <label for="p">Heslo</label>
        <div class="field-inner">
          <svg class="fi" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="p" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="eye-btn" onclick="toggleEye()">
            <svg id="eye-svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="remember">
        <label class="cb">
          <input type="checkbox" id="rem">
          <div class="cb-box"><svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg></div>
        </label>
        <label class="remember-text" for="rem">Zapamatovat na <strong>30 dní</strong></label>
      </div>

      <button type="submit" class="submit-btn" id="btn">
        <span class="btn-text">Přihlásit se →</span>
        <div class="btn-spinner"></div>
      </button>
    </form>

    <div class="card-footer">HomeOS · Chytrá domácnost</div>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      btn.classList.add('loading'); btn.disabled = true;
      err.classList.remove('show');
      try {
        const res = await fetch('/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('u').value.trim(), password: document.getElementById('p').value, remember: document.getElementById('rem').checked })
        });
        const d = await res.json();
        if (d.success) { window.location.href = '/'; }
        else {
          document.getElementById('err-text').textContent = d.error || 'Špatné přihlašovací údaje';
          err.classList.add('show');
          btn.classList.remove('loading'); btn.disabled = false;
          document.getElementById('p').value = ''; document.getElementById('p').focus();
        }
      } catch { document.getElementById('err-text').textContent = 'Chyba připojení'; err.classList.add('show'); btn.classList.remove('loading'); btn.disabled = false; }
    }
    function toggleEye() {
      const i = document.getElementById('p'), s = document.getElementById('eye-svg');
      if (i.type === 'password') { i.type = 'text'; s.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'; }
      else { i.type = 'password'; s.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'; }
    }
    document.getElementById('u').focus();
  </script>
</body>
</html>
